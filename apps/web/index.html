<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var v = localStorage.getItem("keeper-density");
          var d = v === "compact" || v === "comfortable" ? v : "default";
          document.documentElement.setAttribute("data-density", d);
        } catch (e) {
          document.documentElement.setAttribute("data-density", "default");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Outfit:wght@300..700&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <title>Keeper Web</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
