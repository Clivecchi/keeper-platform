<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var v = localStorage.getItem("keeper-density");
          var d = v === "compact" || v === "comfortable" ? v : "default";
          document.documentElement.setAttribute("data-density", d);
        } catch (e) {
          document.documentElement.setAttribute("data-density", "default");
        }
      })();
    </script>

    <meta name="theme-color" content="#241f1c" />
    <meta name="description" content="A calm place to keep what matters — moments, journeys, and memory." />
    <meta name="mobile-web-app-capable" content="yes" />
