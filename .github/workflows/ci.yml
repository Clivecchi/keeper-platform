name: CI
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -w run type-check

      - name: Lint
        run: pnpm -w run lint

      - name: Test
        run: pnpm -w test

      - name: Build Web
        run: pnpm --filter keeper-web run build

      - name: Build API
        run: pnpm --filter keeper-api run build
