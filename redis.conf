# Redis configuration for Keeper Domain Layer
# Optimized for domain caching and development

# Basic settings
port 6379
bind 0.0.0.0
protected-mode no
timeout 0
tcp-keepalive 300

# Memory settings
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Persistence settings
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Append-only file settings
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# Logging
loglevel notice
logfile ""

# Client settings
maxclients 10000

# Slow log settings
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency monitoring
latency-monitor-threshold 100

# Hash settings (optimized for domain objects)
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# Set settings
set-max-intset-entries 512

# Zset settings
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# List settings
list-max-ziplist-size -2
list-compress-depth 0

# HyperLogLog settings
hll-sparse-max-bytes 3000

# Streams settings
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active rehashing
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Client query buffer limit
client-query-buffer-limit 1gb

# Protocol max bulk length
proto-max-bulk-len 512mb

# Frequency of running background tasks
hz 10

# Dynamic settings
dynamic-hz yes

# Jemalloc background thread
jemalloc-bg-thread yes

# Disable dangerous commands in development
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""

# Enable keyspace notifications for cache invalidation
notify-keyspace-events Ex

# Set tracking
tracking-table-max-keys 1000000 