version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: keeper-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    environment:
      - REDIS_REPLICATION_MODE=master
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15
    container_name: keeper-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=keeper
      - POSTGRES_PASSWORD=keeper_dev_password
      - POSTGRES_DB=keeper_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./packages/database/seeds:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keeper -d keeper_dev"]
      interval: 10s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer
    container_name: keeper-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: keeper-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local

networks:
  default:
    name: keeper-network 