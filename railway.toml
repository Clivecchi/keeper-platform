[build]
builder = "nixpacks"
buildCommand = "cd backend && pnpm install && pnpm prisma:generate && pnpm build"

[deploy]
startCommand = "cd backend && pnpm start"
healthcheckPath = "/api/test"
healthcheckTimeout = 100
restartPolicy = "on-failure"
restartPolicyMaxRetries = 10

[deploy.env]
NODE_ENV = "production" 